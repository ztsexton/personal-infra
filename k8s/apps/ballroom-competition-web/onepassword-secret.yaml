apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: zot-registry-credentials
  namespace: web
spec:
  itemPath: "vaults/Kubernetes/items/zot-docker-config"
---
# Instructions for setting up the Docker config in 1Password:
# 
# 1. Create a new item in 1Password:
#    - Vault: Kubernetes
#    - Title: zot-docker-config
#    - Type: Password or Secure Note
# 
# 2. Add a field named ".dockerconfigjson" with this content:
#
# {
#   "auths": {
#     "zot.zachsexton.com": {
#       "username": "admin",
#       "password": "YOUR_ZOT_PASSWORD",
#       "auth": "BASE64_OF_admin:password"
#     }
#   }
# }
#
# To generate the auth field, run:
# echo -n "admin:YOUR_PASSWORD" | base64
#
# Example result:
# {
#   "auths": {
#     "zot.zachsexton.com": {
#       "username": "admin",
#       "password": "scoobydoo2",
#       "auth": "YWRtaW46c2Nvb2J5ZG9vMg=="
#     }
#   }
# }
