apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: ballroom-db
  namespace: web
spec:
  postgresVersion: 16

  instances:
    - name: instance1
      replicas: 1
      dataVolumeClaimSpec:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
      resources:
        requests:
          cpu: "1"
          memory: 4Gi
        limits:
          cpu: "2"
          memory: 8Gi

  patroni:
    dynamicConfiguration:
      postgresql:
        pg_hba:
          - "host all all all md5"

  users:
    - name: ballroom
      databases:
        - ballroom_scorer
      options: "CREATEDB"

  databaseInitSQL:
    name: ballroom-db-init
    key: init.sql

  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              storageClassName: local-path
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
